{% extends 'store/base.html' %}
{% block title %}Order Placed — ShopEasy{% endblock %}

{% block content %}
<div class="order-success">
    <h1>✅ Order Placed Successfully!</h1>
    <p>Thank you, {{ order.full_name }}. Your order <strong>#{{ order.id }}</strong> has been received.</p>
    <p>Total: ₹{{ order.get_total_cost }}</p>
    <a href="{% url 'product_list' %}" class="btn">Continue Shopping</a>
</div>
{% endblock %}
