{% extends 'store/base.html' %}
{% block title %}Register — ShopEasy{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Create an Account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Register</button>
    </form>
    <p>Pehle se account hai? <a href="{% url 'login' %}">Login karein</a></p>
</div>
{% endblock %}
